# Run backend tests on every push and PR targeting master.
# To require this check before merging: Repo → Settings → Branches → Branch protection (master) → Require status checks → "CI".

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Pagedraft.Api.Tests/Pagedraft.Api.Tests.csproj

      - name: Build
        run: dotnet build Pagedraft.Api.Tests/Pagedraft.Api.Tests.csproj --no-restore -c Release

      - name: Test
        run: dotnet test Pagedraft.Api.Tests/Pagedraft.Api.Tests.csproj --no-build -c Release --verbosity normal
